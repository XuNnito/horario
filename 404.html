<style>
  /* Estilos específicos para la página 404 - Footer más abajo */
  body {
    overflow-y: auto; /* Permitir scroll vertical */
    height: auto; /* Altura automática en lugar de 100vh */
    min-height: 100vh; /* Altura mínima de pantalla completa */
  }
  
  .container {
    position: relative;
    margin-top: 85vh; 
    margin-left: 4%;
    width: 50%;
    z-index: 20;
  }
  
  footer {
    margin-top: 0; /* Espacio adicional arriba del footer */
    position: relative;
    z-index: 20;
    animation: footerAnim calc(var(--anime-speed) * 22) linear forwards;
    opacity: 0;
    transform: translateY(50px) scale(0.8);
  }
  
  /* Animación para el footer similar al botón */
  @keyframes footerAnim {
    0%, 60% {
      opacity: 0;
      transform: translateY(50px) scale(0.8);
    }
    70%, 100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
  
  /* Estilos responsivos para dispositivos móviles */
  @media (max-width: 768px) {
    .container {
      margin-left: 2%;
      width: 96%;
      margin-top: 75vh;
    }
    
    footer {
      padding: 15px 10px;
      text-align: center;
    }
    
    footer p {
      font-size: 14px;
      margin-bottom: 15px;
    }
    
    .social-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .social-links > div {
      margin: 0;
    }
    
    .social-links a {
      font-size: 14px;
      display: inline-block;
      padding: 8px 12px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    
    .social-links a:hover {
      background-color: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }
    
    footer > div:last-child {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .footer-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    footer > div:last-child a,
    .footer-links a {
      font-size: 12px;
      padding: 5px 8px;
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    
    footer > div:last-child a:hover,
    .footer-links a:hover {
      background-color: rgba(255, 255, 255, 0.15);
    }
  }
  
  @media (max-width: 480px) {
    .container {
      margin-left: 1%;
      width: 98%;
      margin-top: 70vh;
    }
    
    footer {
      padding: 10px 5px;
    }
    
    footer p {
      font-size: 12px;
    }
    
    .social-links a {
      font-size: 12px;
      padding: 6px 10px;
    }
    
    footer > div:last-child a,
    .footer-links a {
      font-size: 11px;
      padding: 4px 6px;
    }
  }
