<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Catálogos - Horario</title>
  <style>
    body{font-family:Segoe UI,Roboto,Arial;margin:16px}
    header{display:flex;align-items:center;justify-content:space-between}
    button{padding:8px 12px;margin:4px}
    .catalog-list{margin-top:12px}
    .card{border:1px solid #ddd;padding:8px;margin:6px 0;border-radius:4px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center}
    .panel{background:#fff;padding:16px;border-radius:6px;max-width:760px;width:100%}
    table{border-collapse:collapse;width:100%;table-layout:fixed}
    th,td{border:1px solid #ccc;padding:6px;text-align:center}
    td.slot{height:40px;cursor:pointer;background:#fff}
    td.slot.selected{background:#4caf50;color:#fff}
    .small{font-size:0.9em;color:#555}
  </style>
</head>
<body>
  <header>
    <h1>Catálogos</h1>
    <div>
      <button id="btnMas">Más +</button>
    </div>
  </header>

  <section class="catalog-list" id="catalogList">
    <!-- Las materias existentes en el código se muestran aquí y no se eliminan -->
  </section>

  <!-- Modal: datos iniciales -->
  <div id="modalDatos" class="modal" style="display:none">
    <div class="panel">
      <h2>Agregar materia</h2>
      <div>
        <label>Materia (obligatorio)<br>
          <input id="inputMateria" type="text" style="width:100%" required>
        </label>
      </div>
      <div>
        <label>Profesor (obligatorio)<br>
          <input id="inputProfesor" type="text" style="width:100%" required>
        </label>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <label>Grado (obligatorio)<br><input id="inputGrado" type="text" required></label>
        <label>Grupo (obligatorio)<br><input id="inputGrupo" type="text" required></label>
      </div>
      <div style="margin-top:12px;text-align:right">
        <button id="btnCancelarDatos">Cancelar</button>
        <button id="btnSiguiente">Siguiente →</button>
      </div>
    </div>
  </div>

  <!-- Modal: selector de horario -->
  <div id="modalHorario" class="modal" style="display:none">
    <div class="panel">
      <h2>Seleccionar horario</h2>
      <div class="small">Haz clic en los cuadros para seleccionar horas (Lunes a Viernes).</div>
      <div style="overflow:auto;margin-top:8px">
        <table id="tablaHorario">
          <thead>
            <tr>
              <th>Hora</th>
              <th>Lunes</th><th>Martes</th><th>Miércoles</th><th>Jueves</th><th>Viernes</th>
            </tr>
          </thead>
          <tbody id="cuerpoHorario">
            <!-- Generado por JS -->
          </tbody>
        </table>
      </div>

      <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center">
        <div id="seleccionResumen" class="small"></div>
        <div>
          <button id="btnAtrásHorario">Atrás</button>
          <button id="btnGuardar">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Datos ya existentes en el código: NO SE ELIMINAN
    const existentes = [
      { materia: 'Matemáticas', profesor: 'M. López', grado: '3', grupo: 'A', horario: [{dia:'Lunes',hora:'8:00'}] },
      { materia: 'Historia', profesor: 'S. Ruiz', grado: '2', grupo: 'B', horario: [{dia:'Martes',hora:'10:00'}] }
    ];

    // Carga guardados del localStorage y los une con los existentes
    const STORAGE_KEY = 'catalogo_materias';
    function cargarGuardados() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch { return []; }
    }
    function guardarEnLocal(items){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    // UI refs
    const btnMas = document.getElementById('btnMas');
    const modalDatos = document.getElementById('modalDatos');
    const modalHorario = document.getElementById('modalHorario');
    const btnSiguiente = document.getElementById('btnSiguiente');
    const btnCancelarDatos = document.getElementById('btnCancelarDatos');
    const btnAtrásHorario = document.getElementById('btnAtrásHorario');
    const btnGuardar = document.getElementById('btnGuardar');
    const catalogList = document.getElementById('catalogList');
    const inputMateria = document.getElementById('inputMateria');
    const inputProfesor = document.getElementById('inputProfesor');
    const inputGrado = document.getElementById('inputGrado');
    const inputGrupo = document.getElementById('inputGrupo');
    const cuerpoHorario = document.getElementById('cuerpoHorario');
    const seleccionResumen = document.getElementById('seleccionResumen');

    // Horas y días configurables
    const horas = ['8:00','9:00','10:00','11:00','12:00','13:00','14:00'];
    const dias = ['Lunes','Martes','Miércoles','Jueves','Viernes'];

    let seleccionadas = new Set(); // keys "dia|hora"
    let tempDatos = null;

    // Inicializar tabla de horario
    function construirTabla() {
      cuerpoHorario.innerHTML = '';
      for (let h of horas) {
        const tr = document.createElement('tr');
        const th = document.createElement('th');
        th.textContent = h;
        tr.appendChild(th);
        for (let d of dias) {
          const td = document.createElement('td');
          td.className = 'slot';
          td.dataset.dia = d;
          td.dataset.hora = h;
          td.addEventListener('click', () => {
            const key = d+'|'+h;
            if (seleccionadas.has(key)) seleccionadas.delete(key);
            else seleccionadas.add(key);
            td.classList.toggle('selected');
            actualizarResumen();
          });
          tr.appendChild(td);
        }
        cuerpoHorario.appendChild(tr);
      }
      actualizarResumen();
    }

    function actualizarResumen() {
      if (seleccionadas.size === 0) seleccionResumenText = 'No hay horas seleccionadas';
      else {
        const items = Array.from(seleccionadas).map(k => { const [d,h]=k.split('|'); return d+' '+h; });
        seleccionResumenText = 'Seleccionadas: ' + items.join(', ');
      }
      seleccionResumen.textContent = seleccionResumenText;
    }

    function abrirModalDatos() {
      inputMateria.value = '';
      inputProfesor.value = '';
      inputGrado.value = '';
      inputGrupo.value = '';
      modalDatos.style.display = 'flex';
    }
    function cerrarModalDatos(){ modalDatos.style.display = 'none'; }

    function abrirModalHorario(){ modalHorario.style.display = 'flex'; }
    function cerrarModalHorario(){ modalHorario.style.display = 'none'; }

    btnMas.addEventListener('click', abrirModalDatos);
    btnCancelarDatos.addEventListener('click', () => cerrarModalDatos());
    btnAtrásHorario.addEventListener('click', () => { cerrarModalHorario(); abrirModalDatos(); });

    btnSiguiente.addEventListener('click', () => {
      // validación de campos obligatorios
      if (!inputMateria.value.trim() || !inputProfesor.value.trim() || !inputGrado.value.trim() || !inputGrupo.value.trim()) {
        alert('Todos los campos (materia, profesor, grado y grupo) son obligatorios.');
        return;
      }
      tempDatos = {
        materia: inputMateria.value.trim(),
        profesor: inputProfesor.value.trim(),
        grado: inputGrado.value.trim(),
        grupo: inputGrupo.value.trim()
      };
      // reset selección de horario
      seleccionadas.clear();
      // limpiar clases
      document.querySelectorAll('#tablaHorario td.slot').forEach(td => td.classList.remove('selected'));
      cerrarModalDatos();
      abrirModalHorario();
    });

    btnGuardar.addEventListener('click', () => {
      if (!tempDatos) return;
      if (seleccionadas.size === 0) {
        if (!confirm('No ha seleccionado ninguna hora. ¿Desea guardar la materia sin horario?')) return;
      }
      const horario = Array.from(seleccionadas).map(k => { const [dia,hora]=k.split('|'); return {dia,hora}; });
      const nuevo = {...tempDatos, horario};
      // leer guardados previos y anexar (no eliminar existentes en el código)
      const guardados = cargarGuardados();
      guardados.push(nuevo);
      guardarEnLocal(guardados);
      // refrescar UI
      renderCatalogo();
      cerrarModalHorario();
      tempDatos = null;
      alert('Materia guardada correctamente.');
    });

    function renderCatalogo() {
      const guardados = cargarGuardados();
      const todos = existentes.concat(guardados);
      catalogList.innerHTML = '';
      for (const item of todos) {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = '<strong>'+item.materia+'</strong> — '+item.profesor+' <span class="small">Grado '+item.grado+' Grupo '+item.grupo+'</span>';
        if (item.horario && item.horario.length) {
          const ul = document.createElement('ul');
          ul.className = 'small';
          for (const h of item.horario) {
            const li = document.createElement('li');
            li.textContent = h.dia + ' ' + h.hora;
            ul.appendChild(li);
          }
          div.appendChild(ul);
        }
        catalogList.appendChild(div);
      }
    }

    // Inicial
    construirTabla();
    renderCatalogo();
  </script>
</body>
</html>
